name: Build and Test MCP-Win32s

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Install MinGW-w64, Wine, CMake and Ninja
      run: |
        sudo dpkg --add-architecture i386
        sudo apt-get update
        # icoutils provides wrestool, used to assert the embedded UTF-8 manifest.
        sudo apt-get install -y mingw-w64 wine wine32 cmake ninja-build icoutils

    # Phase 4: theft host-native PBT (gcc -std=c99 + ASan/UBSan on the
    # OS-independent modules) runs BEFORE the Wine suite - fail fast with
    # autoshrunk minimal counterexamples. See tests/host/README.md.
    - name: Host-native property tests (theft + sanitizers)
      run: ./build.sh host-pbt

    # Single source of truth: CMakeLists.txt + the "mingw" preset. On this
    # Ubuntu runner there is no WSL interop, so the toolchain selects Wine to
    # run the PEs (the dev host runs them natively). ctest covers the json,
    # transport, tcp (real Winsock via Wine), serial, base64, file-ops and PBT
    # suites.
    - name: Configure (mingw preset)
      run: cmake --preset mingw

    - name: Build
      run: cmake --build --preset mingw

    - name: Test (ctest, Wine runner)
      run: ctest --preset mingw

    # mcp-w32s.exe must carry NO static Winsock import - the TCP backend is
    # runtime-loaded (LoadLibraryA), so the binary still loads on bare Win32s.
    - name: Verify no static Winsock import in mcp-w32s.exe
      run: |
        if i686-w64-mingw32-objdump -p build/mingw/mcp-w32s.exe | grep -i 'wsock32\|ws2_32'; then
          echo "ERROR: mcp-w32s.exe has a static Winsock import (must be runtime-loaded)!"
          exit 1
        fi
        echo "OK: no static Winsock import; TCP is runtime-loaded."

    # Phase 4: the delay-loaded uplift APIs must never appear in the import
    # table - they are GetProcAddress-only, or the binary fails to load on
    # Win32s 1.25a (PHASE4 acceptance criterion 4).
    #
    # 5.4: the nine wide (-W) file/process APIs are the same way - resolved via
    # GetProcAddress only when the host's *A codepage cannot represent a path,
    # never statically imported (W variants are absent from Win32s 1.25a, so a
    # static import would fail the load).
    - name: Verify no delay-loaded uplift API in the import table
      run: |
        if i686-w64-mingw32-objdump -p build/mingw/mcp-w32s.exe | \
           grep -E 'CreateJobObject|CreatePseudoConsole|IsWow64Process|GenerateConsoleCtrlEvent|QueryFullProcessImageName|SetProcessMitigationPolicy|CreateFileW|FindFirstFileW|FindNextFileW|DeleteFileW|CopyFileW|MoveFileW|CreateDirectoryW|RemoveDirectoryW|CreateProcessW'; then
          echo "ERROR: uplift API in the import table (must be runtime-loaded)!"
          exit 1
        fi
        echo "OK: uplift APIs are GetProcAddress-only."

    # Phase 6 Finding #1: mcp-w32s.exe must import ONLY kernel32 + user32 - the
    # two DLLs Win32s 1.25a guarantees. MinGW links the C runtime to msvcrt.dll
    # by default, which Win32s lacks (it ships CRTDLL.DLL), so a default-linked
    # binary fails to load on real Win32s with "Cannot find MSVCRT.DLL". This
    # was invisible to CI because the PEs run under Wine, which DOES provide
    # msvcrt - so only this static import check (not a Wine run) can catch it.
    # The freestanding mini CRT (src/mini_crt.c, MinGW build) keeps the set to
    # {kernel32,user32}; this EXHAUSTIVE allowlist locks it against regression.
    - name: Verify mcp-w32s.exe imports ONLY kernel32 + user32 (Win32s CRT floor)
      run: |
        IMPORTS=$(i686-w64-mingw32-objdump -p build/mingw/mcp-w32s.exe \
          | sed -n 's/.*DLL Name: //p' | tr 'A-Z' 'a-z' | sort -u)
        echo "imports: $IMPORTS"
        UNEXPECTED=$(echo "$IMPORTS" | grep -vE '^(kernel32|user32)\.dll$' || true)
        if [ -n "$UNEXPECTED" ]; then
          echo "ERROR: mcp-w32s.exe imports a DLL that Win32s 1.25a does not provide:"
          echo "$UNEXPECTED"
          echo "(msvcrt.dll? the C runtime must be the freestanding src/mini_crt.c -"
          echo " see plan/PHASE6.md Finding #1 in the host repo.)"
          exit 1
        fi
        echo "OK: imports are exactly kernel32 + user32 (loads on bare Win32s 1.25a)."

    # 5.4: mcp-w32s.exe must carry the Win10 1903+ UTF-8 opt-in as exactly one
    # application manifest at RT_MANIFEST (type 24) / ID 1 - the resource ID
    # CREATEPROCESS_MANIFEST_RESOURCE_ID. Two manifests (e.g. a MinGW default
    # one alongside ours) would be a malformed resource directory; zero means
    # the *A APIs never switch to UTF-8. wrestool (icoutils) lists and extracts
    # the resource; --raw dumps the manifest bytes verbatim for the content grep.
    - name: Verify exactly one UTF-8 activeCodePage manifest at RT_MANIFEST ID 1
      run: |
        N=$(wrestool -l build/mingw/mcp-w32s.exe | grep -c -- '--type=24 --name=1' || true)
        if [ "$N" != "1" ]; then
          echo "ERROR: expected exactly one RT_MANIFEST (type=24) at ID 1, found $N!"
          wrestool -l build/mingw/mcp-w32s.exe
          exit 1
        fi
        MANIFEST=$(wrestool -x --raw --type=24 --name=1 build/mingw/mcp-w32s.exe)
        # Anchor on the element name and its value form. Note: a bare "UTF-8"
        # grep would count 2 (the XML <?xml encoding="UTF-8"?> decl + the
        # activeCodePage value), so match ">UTF-8<" - the element value only.
        ACP=$(printf '%s' "$MANIFEST" | grep -c 'activeCodePage' || true)
        VAL=$(printf '%s' "$MANIFEST" | grep -c '>UTF-8<' || true)
        SMI=$(printf '%s' "$MANIFEST" | grep -c 'schemas.microsoft.com/SMI/2019/WindowsSettings' || true)
        if [ "$ACP" != "1" ] || [ "$VAL" != "1" ] || [ "$SMI" != "1" ]; then
          echo "ERROR: manifest must carry exactly one UTF-8 activeCodePage on the SMI/2019 schema (got activeCodePage=$ACP >UTF-8<=$VAL SMI=$SMI)!"
          printf '%s\n' "$MANIFEST"
          exit 1
        fi
        echo "OK: exactly one UTF-8 activeCodePage manifest at RT_MANIFEST ID 1."

    # Phase 4.0b: wire-contract smoke - real server over /TCP under Wine,
    # validated by the spec-driven smoke client (acceptance criteria 10, 21).
    - name: Wire-contract smoke (server /TCP + wire_client)
      run: |
        cd build/mingw
        cp -r ../../catalog .
        wine ./mcp-w32s.exe /TCP:31799 &
        SERVER_PID=$!
        sleep 8
        RC=0
        wine ./wire_client.exe 127.0.0.1 31799 || RC=$?
        kill $SERVER_PID 2>/dev/null || true
        exit $RC

    # Binary instruction purity is checked on the application objects CMake
    # built (CRT startup is excluded - it legitimately contains FPU/atomics).
    - name: Verify no FPU instructions in application code
      run: |
        i686-w64-mingw32-objdump -d build/mingw/CMakeFiles/mcp-w32s.dir/src/*.obj > app_disasm.txt
        if grep -E 'fld|fst[^r]|fadd|fmul|fdiv|fsub|fsqrt|fcom|fild|fistp' app_disasm.txt; then
          echo "ERROR: Application code contains FPU instructions!"
          exit 1
        fi
        echo "OK: No FPU instructions in application code."

    - name: Verify no 486+ instructions in application code
      run: |
        if grep -iE 'cpuid|cmpxchg|bswap|xadd|rdtsc|cmpxchg8b' app_disasm.txt; then
          echo "ERROR: Application code contains 486+ instructions!"
          exit 1
        fi
        echo "OK: Only i386 instructions in application code."

    - name: Upload main executable
      uses: actions/upload-artifact@v7
      with:
        name: mcp-w32s.exe
        path: |
          build/mingw/mcp-w32s.exe
          catalog/win32-commands.json

    - name: Upload test binaries
      uses: actions/upload-artifact@v7
      with:
        name: test-binaries
        path: build/mingw/test_*.exe

  # Phase 5.0: the Rust MCP bridge (bridge/) is a separate crate (rmcp, stdio).
  # The merge gate requires OBSERVED CI for it, not just a local cargo run, so
  # it builds + tests here with clippy and rustfmt as gates. The release build
  # confirms the server-only/current-thread binary compiles (the client and
  # rt-multi-thread features stay test-only via dev-dependencies).
  bridge:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bridge
    steps:
    - uses: actions/checkout@v6

    - name: Rust toolchain (stable + clippy + rustfmt)
      run: rustup component add clippy rustfmt

    - name: Format check
      run: cargo fmt --check

    - name: Clippy (warnings are errors)
      run: cargo clippy --all-targets -- -D warnings

    - name: Build (release)
      run: cargo build --release

    - name: Test (integration + proptest)
      run: cargo test

  # 5.5 conformance: MCP Inspector CLI drives the bridge over stdio->TCP->device
  # and asserts that tools/list and tools/call work end-to-end.
  #
  # Topology:
  #   Inspector (stdio MCP client)
  #     -> mcp-w32s-bridge (stdio MCP server + TCP device client)
  #       -> mcp-w32s.exe under Wine (TCP device)
  #
  # The bridge is invoked by Inspector as a subprocess ("--cli <bridge> <args>").
  # Inspector connects to the bridge over stdio and relays MCP requests; the
  # bridge connects to the device over TCP and relays wire commands. This is the
  # standard Inspector CLI mode for stdio MCP servers — one process, one stdio
  # channel, one TCP socket to the device.
  #
  # Wine note: Wine on the GitHub ubuntu-latest runner has no ConPTY support, so
  # win32_pty_exec is NOT expected in tools/list (the device's has_pty:false
  # pruning). The conformance checks for win32_exec and win32_list_commands only,
  # and win32_pty_exec only if the device advertised pty.
  conformance:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    # --- build the C device (MinGW + Wine, same as build-and-test) ---
    - name: Install MinGW-w64, Wine, CMake and Ninja
      run: |
        sudo dpkg --add-architecture i386
        sudo apt-get update
        sudo apt-get install -y mingw-w64 wine wine32 cmake ninja-build

    - name: Configure (mingw preset)
      run: cmake --preset mingw

    - name: Build device
      run: cmake --build --preset mingw

    # --- build the Rust bridge ---
    - name: Rust toolchain (stable)
      run: rustup component add rustfmt  # already present; no-op if so

    - name: Build bridge (release)
      run: cargo build --release
      working-directory: bridge

    # --- install Node for npx ---
    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    # --- start the device under Wine, then run the conformance checks ---
    #
    # Port 31800 is used here (31799 is taken by build-and-test when jobs run
    # on the same host, though in practice each job is its own VM; a distinct
    # port avoids accidental cross-job interference).
    #
    # The device writes its ready message and then listens; sleep 8 mirrors the
    # existing wire-smoke step's proven stabilisation delay.
    #
    # Inspector CLI invocation form:
    #   npx @modelcontextprotocol/inspector@0.22.0 --cli \
    #     <bridge-binary> <bridge-transport-flag> <host:port> \
    #     --method <method> [--tool-name <name>]
    #
    # The bridge binary is the stdio MCP server; Inspector spawns it as a
    # subprocess and speaks MCP over its stdio. The bridge then opens a TCP
    # connection to the device at the given host:port. Inspector exits non-zero
    # if the MCP call fails or the output does not match its expectations.
    #
    # The conformance job exercises only safe calls: win32_list_commands is
    # read-only, and win32_exec is never called with unsafe:true. The exec
    # tools are always advertised on a ready device, so no --allow-unsafe-exec
    # is needed here — the unsafe catalog bypass is gated per-call (refused
    # locally without the operator opt-in), not at tool advertisement.
    - name: Conformance (Inspector CLI — tools/list + tools/call)
      run: |
        BRIDGE=bridge/target/release/mcp-w32s-bridge
        DEVICE_PORT=31800

        # copy the catalog into the working directory (the device looks for
        # catalog/win32-commands.json relative to its CWD, same as wire-smoke)
        cd build/mingw
        cp -r ../../catalog .

        # start the device under Wine in the background
        wine ./mcp-w32s.exe /TCP:${DEVICE_PORT} &
        DEVICE_PID=$!

        # wait for the device to bind and emit its ready message
        sleep 8

        RC=0

        # --- check 1: tools/list must contain win32_exec and win32_list_commands
        echo "=== tools/list ==="
        TOOLS_OUTPUT=$(npx --yes @modelcontextprotocol/inspector@0.22.0 --cli \
          ../../${BRIDGE} --tcp 127.0.0.1:${DEVICE_PORT} \
          --method tools/list 2>&1) || RC=$?
        echo "$TOOLS_OUTPUT"
        if [ $RC -ne 0 ]; then
          echo "ERROR: Inspector tools/list exited non-zero"
          kill $DEVICE_PID 2>/dev/null || true
          exit $RC
        fi
        if ! echo "$TOOLS_OUTPUT" | grep -q 'win32_exec'; then
          echo "ERROR: win32_exec not found in tools/list output"
          kill $DEVICE_PID 2>/dev/null || true
          exit 1
        fi
        if ! echo "$TOOLS_OUTPUT" | grep -q 'win32_list_commands'; then
          echo "ERROR: win32_list_commands not found in tools/list output"
          kill $DEVICE_PID 2>/dev/null || true
          exit 1
        fi
        # win32_pty_exec: only assert its absence when pty was not advertised.
        # On Wine (no ConPTY) the device reports has_pty:false and the bridge
        # prunes it. We do NOT hard-require it — if it appears that is fine too.
        echo "OK: win32_exec and win32_list_commands present in tools/list"

        # --- check 2: tools/call win32_list_commands must return a successful
        # structured result (the device returns its command catalog as JSON)
        echo "=== tools/call win32_list_commands ==="
        CALL_OUTPUT=$(npx --yes @modelcontextprotocol/inspector@0.22.0 --cli \
          ../../${BRIDGE} --tcp 127.0.0.1:${DEVICE_PORT} \
          --method tools/call --tool-name win32_list_commands 2>&1) || RC=$?
        echo "$CALL_OUTPUT"
        if [ $RC -ne 0 ]; then
          echo "ERROR: Inspector tools/call win32_list_commands exited non-zero"
          kill $DEVICE_PID 2>/dev/null || true
          exit $RC
        fi
        # A successful structured result must not be flagged as an error by
        # the bridge (isError:false). Inspector prints the result; a conformant
        # response contains the structured content (the commands array or a
        # status field). We check that the output does NOT contain '"isError":true'
        # and that it IS non-empty (something was returned).
        if echo "$CALL_OUTPUT" | grep -q '"isError":true'; then
          echo "ERROR: win32_list_commands returned isError:true"
          kill $DEVICE_PID 2>/dev/null || true
          exit 1
        fi
        echo "OK: win32_list_commands returned a non-error structured result"

        # --- check 3: OpenAI Agents SDK offline MCP check (no LLM, no API key)
        # MCPServerStdio spawns the bridge, which connects to the same Wine
        # device; list_tools + call_tool over the MCP plumbing. A venv avoids
        # the PEP 668 externally-managed-environment restriction on the runner.
        echo "=== OpenAI Agents SDK (offline, no key) ==="
        python3 -m venv /tmp/openai-venv
        /tmp/openai-venv/bin/pip install --quiet openai-agents || {
          echo "ERROR: pip install openai-agents failed"
          kill $DEVICE_PID 2>/dev/null || true
          exit 1
        }
        /tmp/openai-venv/bin/python ../../bridge/clients/openai_agents_check.py \
          127.0.0.1:${DEVICE_PORT} || RC=$?
        if [ $RC -ne 0 ]; then
          echo "ERROR: OpenAI Agents SDK offline check failed"
          kill $DEVICE_PID 2>/dev/null || true
          exit $RC
        fi
        echo "OK: OpenAI Agents SDK offline check passed"

        kill $DEVICE_PID 2>/dev/null || true
        exit $RC

  # Real-Windows job. The ubuntu job runs the PEs under Wine, whose process
  # spawning / Winsock / ConPTY emulation is incomplete - so the exec, serial
  # (exec-integration), TCP and ConPTY suites are host-divergent there. This
  # job builds the SAME i386 MinGW binaries natively under MSYS2 and runs them
  # on a real Windows Server runner, so those suites exercise real cmd.exe, real
  # Winsock and real ConPTY (no Wine, no shims). It does NOT replace the Win32s
  # 1.25a hardware test (windows-latest is modern Windows: it has msvcrt.dll and
  # the full Win32 API, so it cannot catch Win32s-subset or msvcrt-absence
  # issues - the import-allowlist check in the ubuntu job and the manual Win32s
  # guest cover those). (Phase 6 / the Wine-vs-real-Windows parity axis.)
  windows-native:
    name: real-Windows (exec / Winsock / ConPTY, no Wine)
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
    - uses: actions/checkout@v6
    - name: Set up MSYS2 MINGW32 (native i686 toolchain)
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW32
        update: false
        install: >-
          mingw-w64-i686-gcc
          mingw-w64-i686-cmake
          mingw-w64-i686-ninja
          mingw-w64-i686-binutils
    - name: Build (native i686 MinGW on real Windows)
      run: |
        cmake --preset mingw
        cmake --build --preset mingw
    - name: Verify the device still imports ONLY kernel32 + user32
      run: |
        IMPORTS=$(i686-w64-mingw32-objdump -p build/mingw/mcp-w32s.exe \
          | sed -n 's/.*DLL Name: //p' | tr 'A-Z' 'a-z' | sort -u)
        echo "imports: $IMPORTS"
        echo "$IMPORTS" | grep -vqE '^(kernel32|user32)\.dll$' && {
          echo "ERROR: unexpected import (see Finding #1)"; exit 1; } || true
        echo "OK: kernel32 + user32 only."
    - name: Test on real Windows (real cmd.exe / Winsock / ConPTY)
      run: ctest --preset mingw --output-on-failure
