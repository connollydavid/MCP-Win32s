name: Build and Test MCP-Win32s

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Install MinGW-w64, Wine, CMake and Ninja
      run: |
        sudo dpkg --add-architecture i386
        sudo apt-get update
        sudo apt-get install -y mingw-w64 wine wine32 cmake ninja-build

    # Single source of truth: CMakeLists.txt + the "mingw" preset. On this
    # Ubuntu runner there is no WSL interop, so the toolchain selects Wine to
    # run the PEs (the dev host runs them natively). ctest covers the json,
    # transport, tcp (real Winsock via Wine), serial, base64, file-ops and PBT
    # suites.
    - name: Configure (mingw preset)
      run: cmake --preset mingw

    - name: Build
      run: cmake --build --preset mingw

    - name: Test (ctest, Wine runner)
      run: ctest --preset mingw

    # mcp-w32s.exe must carry NO static Winsock import - the TCP backend is
    # runtime-loaded (LoadLibraryA), so the binary still loads on bare Win32s.
    - name: Verify no static Winsock import in mcp-w32s.exe
      run: |
        if i686-w64-mingw32-objdump -p build/mingw/mcp-w32s.exe | grep -i 'wsock32\|ws2_32'; then
          echo "ERROR: mcp-w32s.exe has a static Winsock import (must be runtime-loaded)!"
          exit 1
        fi
        echo "OK: no static Winsock import; TCP is runtime-loaded."

    # Binary instruction purity is checked on the application objects CMake
    # built (CRT startup is excluded - it legitimately contains FPU/atomics).
    - name: Verify no FPU instructions in application code
      run: |
        i686-w64-mingw32-objdump -d build/mingw/CMakeFiles/mcp-w32s.dir/src/*.obj > app_disasm.txt
        if grep -E 'fld|fst[^r]|fadd|fmul|fdiv|fsub|fsqrt|fcom|fild|fistp' app_disasm.txt; then
          echo "ERROR: Application code contains FPU instructions!"
          exit 1
        fi
        echo "OK: No FPU instructions in application code."

    - name: Verify no 486+ instructions in application code
      run: |
        if grep -iE 'cpuid|cmpxchg|bswap|xadd|rdtsc|cmpxchg8b' app_disasm.txt; then
          echo "ERROR: Application code contains 486+ instructions!"
          exit 1
        fi
        echo "OK: Only i386 instructions in application code."

    - name: Upload main executable
      uses: actions/upload-artifact@v7
      with:
        name: mcp-w32s.exe
        path: build/mingw/mcp-w32s.exe

    - name: Upload test binaries
      uses: actions/upload-artifact@v7
      with:
        name: test-binaries
        path: build/mingw/test_*.exe
