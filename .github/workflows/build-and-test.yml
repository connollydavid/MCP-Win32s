name: Build and Test MCP-Win32s

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install MinGW-w64 and Wine
      run: |
        sudo dpkg --add-architecture i386
        sudo apt-get update
        sudo apt-get install -y mingw-w64 wine wine32

    - name: Build main executable (C89 strict, i386 target)
      run: |
        i686-w64-mingw32-gcc -O2 -std=c89 -march=i386 -mtune=i386 \
          -Wall -Werror -pedantic -Wdouble-promotion -Wfloat-equal \
          -Wl,--dynamicbase -Wl,--image-base,0x10000 \
          -Isrc -o mcp-w32s.exe \
          src/mcp-w32s.c src/serial.c src/json_parser.c src/base64.c src/file_ops.c \
          -lkernel32 -luser32 -lwsock32

    - name: Build JSON parser tests
      run: |
        i686-w64-mingw32-gcc -O2 -std=c89 -march=i386 -mtune=i386 \
          -Wall -Werror -pedantic -Wdouble-promotion -Wfloat-equal \
          -Wl,--dynamicbase -Wl,--image-base,0x10000 \
          -Isrc -o tests/test_json.exe \
          tests/test_json.c src/json_parser.c \
          -lkernel32

    - name: Build serial + main loop tests
      run: |
        i686-w64-mingw32-gcc -O2 -std=c89 -march=i386 -mtune=i386 \
          -Wall -Werror -pedantic -Wdouble-promotion -Wfloat-equal \
          -Wl,--dynamicbase -Wl,--image-base,0x10000 \
          -Isrc -DTEST_BUILD -o tests/test_serial.exe \
          tests/test_serial.c src/mcp-w32s.c src/serial.c src/json_parser.c \
          src/base64.c src/file_ops.c \
          -lkernel32 -luser32 -lwsock32

    - name: Build base64 tests
      run: |
        i686-w64-mingw32-gcc -O2 -std=c89 -march=i386 -mtune=i386 \
          -Wall -Werror -pedantic -Wdouble-promotion -Wfloat-equal \
          -Wl,--dynamicbase -Wl,--image-base,0x10000 \
          -Isrc -o tests/test_base64.exe \
          tests/test_base64.c src/base64.c \
          -lkernel32

    - name: Build file ops tests
      run: |
        i686-w64-mingw32-gcc -O2 -std=c89 -march=i386 -mtune=i386 \
          -Wall -Werror -pedantic -Wdouble-promotion -Wfloat-equal \
          -Wl,--dynamicbase -Wl,--image-base,0x10000 \
          -Isrc -o tests/test_file_ops.exe \
          tests/test_file_ops.c src/file_ops.c \
          -lkernel32

    - name: Build property-based tests
      run: |
        i686-w64-mingw32-gcc -O2 -std=c89 -march=i386 -mtune=i386 \
          -Wall -Werror -pedantic -Wdouble-promotion -Wfloat-equal \
          -Wl,--dynamicbase -Wl,--image-base,0x10000 \
          -Isrc -Itests -o tests/test_pbt_base64.exe \
          tests/test_pbt_base64.c src/base64.c \
          -lkernel32

    - name: Run JSON parser tests (Wine)
      run: wine tests/test_json.exe

    - name: Run serial + main loop tests (Wine)
      run: wine tests/test_serial.exe

    - name: Run base64 tests (Wine)
      run: wine tests/test_base64.exe

    - name: Run file ops tests (Wine)
      run: wine tests/test_file_ops.exe

    - name: Run property-based tests (Wine)
      run: wine tests/test_pbt_base64.exe

    - name: Verify no FPU instructions in application code
      run: |
        # Compile application .c files to object files (no CRT)
        i686-w64-mingw32-gcc -O2 -std=c89 -march=i386 -mtune=i386 \
          -Wall -Werror -pedantic -Wdouble-promotion -Wfloat-equal \
          -Isrc -c -o /tmp/json_parser.o src/json_parser.c
        i686-w64-mingw32-gcc -O2 -std=c89 -march=i386 -mtune=i386 \
          -Wall -Werror -pedantic -Wdouble-promotion -Wfloat-equal \
          -Isrc -c -o /tmp/serial.o src/serial.c
        i686-w64-mingw32-gcc -O2 -std=c89 -march=i386 -mtune=i386 \
          -Wall -Werror -pedantic -Wdouble-promotion -Wfloat-equal \
          -Isrc -c -o /tmp/mcp-w32s.o src/mcp-w32s.c
        i686-w64-mingw32-gcc -O2 -std=c89 -march=i386 -mtune=i386 \
          -Wall -Werror -pedantic -Wdouble-promotion -Wfloat-equal \
          -Isrc -c -o /tmp/base64.o src/base64.c
        i686-w64-mingw32-gcc -O2 -std=c89 -march=i386 -mtune=i386 \
          -Wall -Werror -pedantic -Wdouble-promotion -Wfloat-equal \
          -Isrc -c -o /tmp/file_ops.o src/file_ops.c
        # Disassemble all application object files
        i686-w64-mingw32-objdump -d /tmp/json_parser.o /tmp/serial.o /tmp/mcp-w32s.o \
          /tmp/base64.o /tmp/file_ops.o > app_disasm.txt
        if grep -E 'fld|fst[^r]|fadd|fmul|fdiv|fsub|fsqrt|fcom|fild|fistp' app_disasm.txt; then
          echo "ERROR: Application code contains FPU instructions!"
          exit 1
        fi
        echo "OK: No FPU instructions in application code."

    - name: Verify no 486+ instructions in application code
      run: |
        if grep -iE 'cpuid|cmpxchg|bswap|xadd|rdtsc|cmpxchg8b' app_disasm.txt; then
          echo "ERROR: Application code contains 486+ instructions!"
          exit 1
        fi
        echo "OK: Only i386 instructions in application code."

    - name: Upload main executable
      uses: actions/upload-artifact@v4
      with:
        name: mcp-w32s.exe
        path: mcp-w32s.exe

    - name: Upload test binaries
      uses: actions/upload-artifact@v4
      with:
        name: test-binaries
        path: |
          tests/test_json.exe
          tests/test_serial.exe
          tests/test_base64.exe
          tests/test_file_ops.exe
          tests/test_pbt_base64.exe
